name: Build and Release - Multi Platform

on:
  push:
    tags:
      - 'v*'  # Trigger saat push tag seperti v1.0.0

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create (or reuse) Release for this tag
        id: create
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-updater-windows:
    runs-on: windows-latest
    needs: create_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build updater for windows
        run: pyinstaller ONEFILE_up.spec

      - name: Show dist
        run: dir dist
        shell: pwsh

      - name: Create GitHub Release (attach .exe)
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: create_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create app-config.json at repo root
        shell: bash
        run: |
          echo "{\"version\": \"${GITHUB_REF_NAME}\"}" > app-config.json

      - name: Build (ONEFILE.spec) for windows
        run: pyinstaller ONEFILE_nt.spec

      - name: Show dist
        run: dir dist
        shell: pwsh

      - name: Create GitHub Release (attach .exe)
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build-macos:
    runs-on: macos-latest
    needs: create_release

    steps:
      - name: Check Python architecture
        run: python3 -c "import platform; print(platform.machine())"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --upgrade --no-deps --only-binary=:all: \
            || true
          pip install --only-binary=:all: PyQt5 PyQtChart PyQt5-sip PyQt5-Qt5
          pip install pyinstaller

      - name: Generate app-config.json
        run: |
          echo "{\"version\": \"${GITHUB_REF_NAME}\"}" > app-config.json

      - name: Build (ONEFILE.spec) for macOS
        run: pyinstaller ONEFILE_dw.spec

      - name: Show dist
        run: ls -la dist
        shell: pwsh

      - name: Zip .app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "ControlCenter.app" "ControlCenter-macOS.zip"
        
      # - name: Create DMG from .app
      #   run: |
      #     APP_PATH="${{ steps.resolve_app.outputs.app_path }}"
      #     rm -rf dmg && mkdir -p dmg
      #     cp -R "$APP_PATH" dmg/
      #     ln -s /Applications dmg/Applications
      #     # Example output name: ControlCenter-macOS.dmg
      #     APP_BASENAME="$(basename "$APP_PATH")"
      #     DMG_NAME="$(basename "$APP_BASENAME" .app)-macOS.dmg"
      #     hdiutil create \
      #       -volname "$(basename "$APP_BASENAME" .app)" \
      #       -srcfolder dmg \
      #       -ov -format UDZO "dist/${DMG_NAME}"
      #     ls -la "dist/${DMG_NAME}"

      - name: Create GitHub Release (attach .zip)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}