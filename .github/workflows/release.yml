name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to upload assets to the Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        
      - name: Verify resources module
        run: python -c "import importlib; importlib.import_module('pages.Home.resources_rc'); print('resources_rc OK')"

      - name: Create app-config.json at repo root
        shell: bash
        run: |
          echo "{\"version\": \"${GITHUB_REF_NAME}\"}" > app-config.json

      - name: Build (ONEFILE.spec)
        run: pyinstaller ONEFILE.spec

      - name: Show dist
        run: dir dist
        shell: pwsh

      - name: Create GitHub Release (attach .exe)
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe   # <— glob must match the actual filename
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
