name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create app-config.json at repo root
        shell: bash
        run: |
          echo "{\"version\": \"${GITHUB_REF_NAME}\"}" > app-config.json

      - name: Build with PyInstaller (ONEFILE.spec)
        run: pyinstaller ONEFILE.spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist\*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}